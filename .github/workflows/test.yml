name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Node.js ${{ matrix.node }} / Babel ${{ matrix.babel }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [10, 22, 24, 26]
        babel: [7, 8]
        exclude:
          # Babel 8 requires Node.js 20+, so it cannot run on Node.js 10.
          - node: 10
            babel: 8
    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Set up Node.js ${{ matrix.node }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}

      - name: Downgrade dev dependencies to Babel 7
        if: matrix.babel == 7
        run: >-
          yarn add --dev
          @babel/core@^7.0.0
          @babel/plugin-transform-arrow-functions@^7.0.0
          @babel/plugin-transform-block-scoping@^7.0.0
          @babel/plugin-transform-classes@^7.0.0

      - name: Run tests
        if: matrix.node != 10
        run: yarn test

      - name: Run tests (Node.js 10)
        if: matrix.node == 10
        run: yarn add --dev mocha@^6.2.1 && yarn mocha
